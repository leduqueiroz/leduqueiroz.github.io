<!doctype html><html lang=pt><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Eduardo Queiróz</title><meta name=description content="Engenheiro de software focado em sistemas distribuídos, cloud, eventos e microserviços."><meta name="google-site-verification" content="YZt--bJGFhf1puUTMa3odpocmGWn3v5bRppUsbXeJeA" /><meta name=author content="Eduardo Queiróz"><meta property=og:title content="Eduardo Queiróz"><meta property=og:description content="Engenheiro de software focado em sistemas distribuídos, cloud, eventos e microserviços."><meta property=og:type content=website><meta property=og:image content="https://leduqueiroz.github.io/public/SEO.png"><meta property=og:url content="https://leduqueiroz.github.io/"><meta name=twitter:card content=summary_large_image><meta name=twitter:site content="@eduqueirooz"><meta name=twitter:creator content="@eduqueirooz"><meta name=twitter:title content="Eduardo Queiróz"><meta name=twitter:description content="Engenheiro de software focado em sistemas distribuídos, cloud, eventos e microserviços."><meta name=twitter:image content="https://leduqueiroz.github.io/public/SEO.png"><style>:root{--bg-color:#2E3440;--text-color:#ECEFF4;--dim-text-color:#81A1C1}body{margin:0;background:var(--bg-color);color:var(--text-color);font-family:"Courier New",monospace;overflow-x:hidden}#screen{display:block;position:fixed;top:0;left:0;z-index:-1;pointer-events:none;width:100%;height:100%}#feed{max-width:900px;margin:100px auto 0;padding:20px;min-height:calc(100vh - 280px)}.para{margin:6px 0;line-height:1.6;white-space:pre-wrap}</style><link rel="icon" href="favicon.svg"><canvas id=screen></canvas><main id=feed></main><script>
(function(){
/* 1. Override #feed innerHTML to bypass old WASM content */
var feed=document.getElementById('feed');
var _set=Object.getOwnPropertyDescriptor(Element.prototype,'innerHTML').set;
var _get=Object.getOwnPropertyDescriptor(Element.prototype,'innerHTML').get;
var name='Eduardo Queiróz';
var bio=[
'Engenheiro de software focado na construção de sistemas distribuídos, arquitetura em cloud, design orientado a eventos e microserviços. Principais interesses incluem plataformas de mensageria, orquestração de containers, system design e liderança técnica em ambientes ágeis.',
'Áreas de interesse: arquiteturas distribuídas e sistemas escaláveis, computação em nuvem e plataformas cloud-native, arquiteturas orientadas a eventos e mensageria, microserviços e design de sistemas, containerização e orquestração (Docker, Kubernetes), liderança técnica e times ágeis.',
'Tecnologias: C#, .NET, TypeScript | Azure, Docker, Kubernetes, IaC | Kafka, RabbitMQ, Azure Service Bus | microserviços, sistemas distribuídos, arquitetura orientada a eventos | system design, escalabilidade, resiliência, observabilidade.'
];
var homeHTML='<p style="text-align:center;margin:16px 0;"><img src="public/snake.svg" alt="" style="max-width:100%;height:auto;"></p>'
+bio.map(function(p){return '<p class="para">&gt; '+p+'</p>';}).join('');
var blogHTML='<p class="para">&gt; Blog Index</p><p class="para">&gt; Nenhum post ainda.</p>';
Object.defineProperty(feed,'innerHTML',{
set:function(v){
  var h=window.location.hash||'#/';
  if(h==='#/'||h===''){_set.call(this,homeHTML);}
  else if(h.startsWith('#/blog')){_set.call(this,blogHTML);}
  else{_set.call(this,v);}
},
get:function(){return _get.call(this);}
});

/* 2. Fix footer when WASM appends it: remove "Vim powered", fix GitHub link */
var bodyObs=new MutationObserver(function(mutations){
  mutations.forEach(function(m){
    m.addedNodes.forEach(function(node){
      if(node.nodeType===1&&node.tagName==='FOOTER'){
        node.querySelectorAll('span').forEach(function(span){
          if(/vim powered/i.test(span.textContent)){
            var prev=span.previousElementSibling;
            if(prev&&/•/.test(prev.textContent))prev.remove();
            span.remove();
          }
        });
        var link=node.querySelector('a');
        if(link){link.href='https://github.com/leduqueiroz';link.textContent='GitHub';}
      }
    });
  });
});
bodyObs.observe(document.body,{childList:true});
})();
</script><script defer src=build/app.5e81f530.js></script></html>
